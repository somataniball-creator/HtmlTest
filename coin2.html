<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抛硬币做决定 | 告别选择困难</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --text-color: #212529;
            --card-bg: #ffffff;
            --border-color: #dee2e6;
            --btn-bg: #007bff;
            --btn-hover: #0069d9;
            --shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }
        
        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --text-color: #f8f9fa;
            --card-bg: #2d2d2d;
            --border-color: #444444;
            --btn-bg: #0069d9;
            --btn-hover: #0056b3;
            --shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background-color 0.3s ease;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 30px;
            box-shadow: var(--shadow);
            text-align: center;
        }
        
        h1 {
            margin-bottom: 20px;
            font-size: 2rem;
            color: var(--text-color);
        }
        
        .coin-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 30px auto;
            perspective: 1000px;
            cursor: pointer;
        }
        
        .coin {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        
        /* 核心：翻面翻转动画 替代转圈 */
        .coin.flip-head {
            transform: translateY(-40px) rotateY(1440deg);
        }
        .coin.flip-tail {
            transform: translateY(-40px) rotateY(1620deg);
        }
        
        .coin .side {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            font-weight: bold;
            color: #fff;
            box-shadow: 0 0 15px rgba(0,0,0,0.25);
        }
        
        /* 引用外网高清硬币图 透明背景 */
        .coin .front {
            background: url('https://purepng.com/public/uploads/large/purepng.com-gold-coin-money-currency-dollar-gold-coin-1715278013187ndq0x.png') center/cover no-repeat;
        }
        
        .coin .back {
            background: url('https://purepng.com/public/uploads/large/purepng.com-gold-coin-gold-money-currency-dollar-1715278042985z7u0x.png') center/cover no-repeat;
            transform: rotateY(180deg);
        }
        
        .result {
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            background-color: rgba(0,0,0,0.05);
            font-size: 1.2rem;
            font-weight: bold;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .customize {
            margin: 20px 0;
        }
        
        .customize input {
            width: 45%;
            padding: 10px;
            margin: 5px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: all 0.3s ease;
        }
        
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }
        
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: var(--btn-bg);
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        button:hover {
            background-color: var(--btn-hover);
            transform: translateY(-2px);
        }
        
        .history {
            margin-top: 20px;
            max-height: 150px;
            overflow-y: auto;
            text-align: left;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background-color: rgba(0,0,0,0.03);
            transition: all 0.3s ease;
        }
        
        .history h3 {
            margin-bottom: 10px;
            font-size: 1rem;
        }
        
        .history ul {
            list-style: none;
        }
        
        .history li {
            padding: 5px 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
        }
        
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-color);
        }
        
        @media (max-width: 400px) {
            .container {
                padding: 20px;
            }
            .coin-container {
                width: 150px;
                height: 150px;
            }
            .customize input {
                width: 100%;
                margin: 5px 0;
            }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle">🌙</button>
    
    <div class="container">
        <h1>抛硬币做决定</h1>
        
        <div class="customize">
            <input type="text" id="frontText" placeholder="正面代表什么..." value="去做">
            <input type="text" id="backText" placeholder="反面代表什么..." value="不做">
        </div>
        
        <div class="coin-container" id="coinContainer">
            <div class="coin" id="coin">
                <div class="side front"></div>
                <div class="side back"></div>
            </div>
        </div>
        
        <div class="result" id="result">点击硬币开始抛掷</div>
        
        <div class="controls">
            <button id="flipBtn">再抛一次</button>
            <button id="clearBtn">清空记录</button>
        </div>
        
        <div class="history">
            <h3>历史记录</h3>
            <ul id="historyList"></ul>
        </div>
    </div>

    <audio id="flipSound" preload="auto">
        <source src="data:audio/wav;base64,UklGRjIAAABXQVZFZm10IBIAAAABAAEAQB8AAEAfAAABAAgAAABmYWN0BAAAAAAAAABkYXRhAAAAAA==" type="audio/wav">
    </audio>

    <script>
        const coin = document.getElementById('coin');
        const result = document.getElementById('result');
        const flipBtn = document.getElementById('flipBtn');
        const clearBtn = document.getElementById('clearBtn');
        const historyList = document.getElementById('historyList');
        const frontTextInput = document.getElementById('frontText');
        const backTextInput = document.getElementById('backText');
        const themeToggle = document.getElementById('themeToggle');
        const coinContainer = document.getElementById('coinContainer');
        const flipSound = document.getElementById('flipSound');
        
        let isFlipping = false;
        let flipCount = 0;
        let history = [];
        
        let currentTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', currentTheme);
        updateThemeIcon();
        
        function playFlipSound() {
            try {
                flipSound.play().catch(e => {});
            } catch (e) {}
        }
        
        // 翻面翻转核心逻辑
        function flipCoin() {
            if (isFlipping) return;
            isFlipping = true;
            playFlipSound();
            result.textContent = "抛掷中...";
            
            // 重置状态
            coin.classList.remove('flip-head','flip-tail');
            void coin.offsetWidth;
            
            const isHeads = Math.random() < 0.5;
            if(isHeads){
                coin.classList.add('flip-head');
            }else{
                coin.classList.add('flip-tail');
            }
            
            setTimeout(() => {
                const frontText = frontTextInput.value || "正面";
                const backText = backTextInput.value || "反面";
                const resText = isHeads ? frontText : backText;
                const resName = isHeads ? "正面" : "反面";
                
                result.textContent = `结果: ${resName} → ${resText}`;
                result.style.color = isHeads ? "#d4af37" : "#666";
                
                flipCount++;
                const time = new Date().toLocaleTimeString();
                history.push(`${time} - 第${flipCount}次: ${resName}(${resText})`);
                updateHistory();
                
                isFlipping = false;
            },1200)
        }
        
        function updateHistory() {
            historyList.innerHTML = '';
            history.forEach(item=>{
                let li = document.createElement('li');
                li.innerText = item;
                historyList.appendChild(li);
            })
        }
        
        function clearHistory() {
            flipCount = 0;
            history = [];
            updateHistory();
            result.textContent = "点击硬币开始抛掷";
            result.style.color = "";
            coin.classList.remove('flip-head','flip-tail');
        }
        
        function toggleTheme() {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', currentTheme);
            localStorage.setItem('theme', currentTheme);
            updateThemeIcon();
        }
        
        function updateThemeIcon() {
            themeToggle.textContent = currentTheme === 'light' ? '🌙' : '☀️';
        }
        
        coinContainer.addEventListener('click',flipCoin);
        flipBtn.addEventListener('click',flipCoin);
        clearBtn.addEventListener('click',clearHistory);
        themeToggle.addEventListener('click',toggleTheme);
        updateHistory();
    </script>
</body>
</html>
