<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抛硬币</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 主题切换按钮已注释
    <button class="theme-toggle" id="themeToggle">🌙</button>
    -->
    
    <div class="container">
        <h1>抛硬币</h1>
        
        <!-- 顶部填空功能已注释
        <div class="customize">
            <input type="text" id="frontText" placeholder="正面代表什么..." value="去做">
            <input type="text" id="backText" placeholder="反面代表什么..." value="不做">
        </div>
        -->
        
        <div class="coin-container" id="coinContainer">
            <div class="coin" id="coin">
                <div class="side front">🪙</div>
                <div class="side back">🪙</div>
            </div>
        </div>
        
        <!-- 结果显示功能已注释
        <div class="result" id="result">点击硬币开始抛掷</div>
        -->
        
        <!-- 再抛一次按钮已注释
        <div class="controls">
            <button id="flipBtn">再抛一次</button>
        </div>
        -->
        
        <!-- 历史记录入口按钮 -->
        <button class="history-entry-btn" id="historyEntryBtn">
            <span class="history-icon">📋</span>
            <span class="history-text">历史记录</span>
        </button>
    </div>

    <!-- 历史记录弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3>历史记录</h3>
                <button class="modal-close" id="modalClose">×</button>
            </div>
            <div class="modal-body">
                <div class="history-list-container">
                    <ul id="historyList"></ul>
                </div>
            </div>
            <div class="modal-footer">
                <button class="clear-btn" id="clearBtn">清空记录</button>
            </div>
        </div>
    </div>

    <audio id="flipSound" preload="auto">
        <source src="data:audio/wav;base64,UklGRjIAAABXQVZFZm10IBIAAAABAAEAQB8AAEAfAAABAAgAAABmYWN0BAAAAAAAAABkYXRhAAAAAA==" type="audio/wav">
    </audio>

    <script src="script.js"></script>
</body>
</html>
