<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>应用主页</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #f8f9fa;
            --card-bg: #2d2d2d;
            --border-color: #444444;
            --btn-bg: #0069d9;
            --btn-hover: #0056b3;
            --coin-front: rgb(247,148,30);
            --coin-back: rgb(200,120,25);
            --shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 40px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        h1 {
            margin-bottom: 30px;
            font-size: 2rem;
            color: var(--text-color);
        }

        .app-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .app-card {
            display: flex;
            align-items: center;
            padding: 20px;
            background-color: var(--bg-color);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-color);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .app-card:hover {
            border-color: var(--coin-front);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(247,148,30,0.2);
        }

        .app-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--coin-front) 0%, rgb(220,130,25) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin-right: 20px;
            flex-shrink: 0;
        }

        .app-info {
            text-align: left;
            flex: 1;
        }

        .app-name {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .app-desc {
            font-size: 0.9rem;
            color: #888;
        }

        .enter-btn {
            padding: 10px 24px;
            background-color: var(--btn-bg);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .enter-btn:hover {
            background-color: var(--btn-hover);
            transform: translateY(-2px);
        }

        @media (max-width: 400px) {
            .container {
                padding: 25px;
            }

            .app-card {
                flex-direction: column;
                text-align: center;
            }

            .app-icon {
                margin-right: 0;
                margin-bottom: 15px;
            }

            .app-info {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>应用中心</h1>
        
        <div class="app-list">
            <a href="./Coin/index.html" class="app-card">
                <div class="app-icon">🪙</div>
                <div class="app-info">
                    <div class="app-name">抛硬币</div>
                    <div class="app-desc">帮你做决定的抛硬币工具</div>
                </div>
                <button class="enter-btn">进入</button>
            </a>
        </div>
    </div>
</body>
</html>
